{% load static %}

<link rel="stylesheet" href="{% static 'css/user_login.css' %}">

{% block body %}

{% include 'recruiter_navigation.html' %}

<h1 class="text-center" style="color:#071739; font-weight:bold; margin-top:30px; margin-bottom:25px;">
    <i class="fa fa-users" style="color:#2563EB;"></i> Job Lists
</h1>

<div class="container">

<table class="table table-hover table-bordered" id="example"
       style="background:white;
              border-radius:15px;
              overflow:hidden;
              box-shadow:0 6px 20px rgba(0,0,0,0.1);">

    <thead>

    <tr style="background:#2563EB; color:white; font-size:16px;">

        <th>S.no</th>
        <th>Job title</th>
        <th>Creation date</th>
        <th>Action</th>

    </tr>

    </thead>

    <tbody>

    {% for i in jobs %}

    <tr style="background:#F8FAFC;">

        <td>{{forloop.counter}}</td>

        <td>
            <strong>
                {{i.title}}
            </strong>
        </td>

        <td>{{i.creation_date}}</td>

<td>

    <a href="{% url 'editjob' i.id %}"
       class="btn btn-success btn-sm mr-2"
       style="border-radius:8px; padding:8px 16px; margin-right:10px;">
        Edit
    </a>

    <a href="#"
       class="btn btn-danger btn-sm"
       style="border-radius:8px; padding:8px 16px;"
       onclick="return confirm('Are you sure you want to delete this Job?')">
        <i class="fa fa-trash"></i> Delete
    </a>

</td>

    </tr>

    {% endfor %}

    </tbody>

</table>
</div>
{% include 'footer.html' %}


<script>
$(document).ready(function () {

    new DataTable('#example', {
        layout: {
            topStart: {
                buttons: [
                    'copyHtml5',
                    'excelHtml5',
                    'csvHtml5',
                    'pdfHtml5'
                ]
            }
        }
    });

});
</script>



{% endblock %}
