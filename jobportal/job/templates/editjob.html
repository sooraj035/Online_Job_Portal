{% load static %}
<link rel="stylesheet" href="{% static 'css/user_login.css' %}">

{% block body %}

{% include 'recruiter_navigation.html' %}

<style>

    .edit-job-section{
        padding:60px 0;
        background:#F1F5F9;
        min-height:100vh;
    }

    .edit-job-card{
        background:#fff;
        border-radius:18px;
        padding:40px;
        box-shadow:0 8px 25px rgba(0,0,0,0.08);
    }

    .edit-job-header{
        text-align:center;
        margin-bottom:35px;
    }

    .edit-job-header i{
        font-size:60px;
        color:#2563EB;
        margin-bottom:15px;
    }

    .edit-job-header h2{
        font-weight:700;
        color:#0F172A;
        margin-bottom:8px;
    }

    .edit-job-header p{
        color:#64748B;
        font-size:15px;
    }

    .form-group label{
        font-weight:600;
        color:#1E293B;
        margin-bottom:8px;
    }

    .form-control{
        height:50px;
        border-radius:10px;
        border:1px solid #CBD5E1;
        box-shadow:none;
    }

    textarea.form-control{
        height:130px;
        resize:none;
        padding-top:12px;
    }

    .form-control:focus{
        border-color:#2563EB;
        box-shadow:0 0 0 0.1rem rgba(37,99,235,0.20);
    }

    .logo-box{
        background:#F8FAFC;
        border:1px dashed #CBD5E1;
        border-radius:12px;
        padding:15px;
        text-align:center;
    }

    .logo-box img{
        border-radius:10px;
        object-fit:cover;
        margin-bottom:10px;
    }

    .change-logo{
        display:inline-block;
        margin-top:8px;
        color:#2563EB;
        font-weight:600;
        text-decoration:none;
    }

    .change-logo:hover{
        text-decoration:none;
        color:#1D4ED8;
    }

    .update-btn{
        width:100%;
        height:52px;
        border:none;
        border-radius:12px;
        background:#2563EB;
        color:#fff;
        font-size:17px;
        font-weight:600;
        margin-top:20px;
        transition:0.3s;
    }

    .update-btn:hover{
        background:#1D4ED8;
    }

    .date-text{
        color:#EF4444;
        font-size:13px;
        margin-left:5px;
    }

</style>


<div class="edit-job-section">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-10">

                <div class="edit-job-card">

                    <div class="edit-job-header">

                        <i class="fa fa-briefcase"></i>

                        <h2>Edit Job Details</h2>

                        <p>Update your job information professionally</p>

                    </div>


                    <form method="POST" enctype="multipart/form-data">

                        {% csrf_token %}

                        <div class="form-row">

                            <div class="form-group col-md-12">

                                <label>Job Title</label>

                                <input type="text"
                                       class="form-control"
                                       name="jobtitle"
                                       value="{{job.title}}">

                            </div>

                        </div>



                        <div class="form-row">

                            <div class="form-group col-md-6">

                                <label>
                                    Start Date
                                    <span class="date-text">
                                        [{{job.start_date}}]
                                    </span>
                                </label>

                                <input type="date"
                                       class="form-control"
                                       name="startdate">


                            </div>


                            <div class="form-group col-md-6">

                                <label>
                                    End Date
                                    <span class="date-text">
                                        [{{job.end_date}}]
                                    </span>
                                </label>

                                <input type="date"
                                       class="form-control"
                                       name="enddate">

                            </div>

                        </div>



                        <div class="form-row">

                            <div class="form-group col-md-6">

                                <label>Salary (CTC)</label>

                                <input type="text"
                                       class="form-control"
                                       name="salary"
                                       value="{{job.salary}}">

                            </div>


                            <div class="form-group col-md-6">

                                <label>Company Logo</label>

                                <div class="logo-box">

                                    <img src="{{job.image.url}}"
                                         width="110"
                                         height="110">

                                    <br>

                                    <a href="{% url 'changecompanylogo' job.id %}"
                                       class="change-logo">
                                        Change Logo
                                    </a>

                                </div>

                            </div>

                        </div>



                        <div class="form-row">

                            <div class="form-group col-md-6">

                                <label>Experience (In Years)</label>

                                <input type="text"
                                       class="form-control"
                                       name="experience"
                                       value="{{job.experience}}">

                            </div>


                            <div class="form-group col-md-6">

                                <label>Company Location</label>

                                <input type="text"
                                       class="form-control"
                                       name="location"
                                       value="{{job.location}}">

                            </div>

                        </div>



                        <div class="form-row">

                            <div class="form-group col-md-12">

                                <label>Skills Required</label>

                                <input type="text"
                                       class="form-control"
                                       name="skills"
                                       value="{{job.skills}}">

                            </div>

                        </div>



                        <div class="form-row">

                            <div class="form-group col-md-12">

                                <label>Job Description</label>

                                <textarea class="form-control"
                                          name="description">{{job.description}}</textarea>

                            </div>

                        </div>



                        <button type="submit"
                                class="update-btn">
                            Update Job
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>


{% include 'footer.html' %}


{% if error == "no" %}
<script>

    alert("Job details Updated Successfully");

    window.location.href = "{% url 'editjob' job.id %}";

</script>
{% endif %}


{% if error == "yes" %}
<script>

    alert("Failed To Update Job details");

</script>
{% endif %}

{% endblock %}
